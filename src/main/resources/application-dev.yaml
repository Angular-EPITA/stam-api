spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/stam_db
    username: stam_admin
    password: stam_password
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: stam-group

  sql:
    init:
      mode: always
      continue-on-error: true