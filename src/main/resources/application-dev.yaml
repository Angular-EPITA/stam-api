spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/stam_db
    username: stam_admin
    password: stam_password

  sql:
    init:
      mode: always
      continue-on-error: false
      data-locations: classpath:data.sql

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
