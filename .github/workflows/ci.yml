name: Java CI & Auto-Release

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  build-and-release:
    runs-on: ubuntu-24.04
    if: "!startsWith(github.event.head_commit.message, 'chore(release)')"
    permissions:
      contents: write
      packages: write
    
    env:
      CI_REGISTRY_IMAGE: ghcr.io/angular-epita/stam-api

    steps:
      # --- 1. AUTHENTIFICATION MAGIQUE ---
      - name: Générer le token de la GitHub App
        id: app-token
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      # --- 2. CONFIGURATION & MAVEN ---
      - name: Setup Java 21
        uses: actions/setup-java@v4 # Action officielle GitHub
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Test
        run: mvn clean verify 

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3 # Action officielle Docker
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- 3. DOCKER SUR DEVELOP ---
      - name: Push Docker (Develop)
        if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
        run: |
          docker build -t $CI_REGISTRY_IMAGE:develop -t $CI_REGISTRY_IMAGE:${{ github.sha }} .
          docker push $CI_REGISTRY_IMAGE:develop
          docker push $CI_REGISTRY_IMAGE:${{ github.sha }}

      # --- 4. AUTO-RELEASE 100% BASH & MAVEN (Niveau Pro) ---
      - name: Bumper la version et Commiter
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | sed 's/-SNAPSHOT//')
          
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
          NEW_VERSION="$major.$minor.$((patch + 1))"
          echo "APP_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          
          echo "Passage de la version $CURRENT_VERSION à $NEW_VERSION"
          
          mvn versions:set -DnewVersion=$NEW_VERSION -DgenerateBackupPoms=false
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(release): v$NEW_VERSION [skip ci]"
          git push origin main

      - name: Créer la Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh release create v${{ env.APP_VERSION }} \
            --title "Release v${{ env.APP_VERSION }}" \
            --generate-notes

      # --- 5. DOCKER SUR MAIN ---
      - name: Push Docker (Main / Prod)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker build -t $CI_REGISTRY_IMAGE:latest -t $CI_REGISTRY_IMAGE:v${{ env.APP_VERSION }} -t $CI_REGISTRY_IMAGE:${{ github.sha }} .
          docker push $CI_REGISTRY_IMAGE:latest
          docker push $CI_REGISTRY_IMAGE:v${{ env.APP_VERSION }}
          docker push $CI_REGISTRY_IMAGE:${{ github.sha }}
