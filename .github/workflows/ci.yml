name: Java CI & Auto-Release

on:
  push:
    branches: ["main", "develop", "feature/**", "feat/**", "fix/**", "hotfix/**"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # ============================================================
  # JOB 1 — CI (Intégration Continue)
  # S'exécute sur TOUTES les branches (feature, develop, main)
  # ============================================================
  ci:
    name: "CI — Build, Test & Analyse"
    runs-on: ubuntu-24.04
    if: >-
      github.event_name == 'pull_request' ||
      !startsWith(github.event.head_commit.message, 'chore(release)')
    permissions:
      contents: read

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Test (+ JaCoCo ≥ 70%)
        run: mvn clean verify

      - name: Publish JaCoCo Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: OWASP Dependency Check (CVE Report)
        run: mvn dependency-check:check -DfailBuildOnCVSS=7 || true

      - name: Publish CVE Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.*

  # ============================================================
  # JOB 2 — CD (Déploiement Continu)
  # S'exécute UNIQUEMENT sur les branches longues (develop, main)
  # après succès du job CI
  # ============================================================
  cd:
    name: "CD — E2E, Docker & Release"
    needs: ci
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: write
      packages: write
    env:
      CI_REGISTRY_IMAGE: ghcr.io/angular-epita/stam-api

    steps:
      # --- 1. AUTHENTIFICATION MAGIQUE ---
      - name: Générer le token de la GitHub App
        id: app-token
        if: github.ref == 'refs/heads/main'
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build (skip tests — already validated by CI)
        run: mvn clean package -DskipTests

      # --- E2E TESTS (Newman) ---
      - name: Start infra + API for E2E tests
        run: |
          docker compose -f docker-compose.yml up -d
          sleep 5
          java -jar target/stam-api-*.jar &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "API is ready"
              break
            fi
            echo "Waiting for API... ($i/60)"
            sleep 2
          done

      - name: Run Newman E2E Tests
        run: |
          npm install -g newman newman-reporter-htmlextra
          newman run e2e/stam-api.postman_collection.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export target/newman-report.html

      - name: Publish Newman Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-e2e-report
          path: target/newman-report.html

      - name: Stop E2E containers
        if: always()
        run: docker compose -f docker-compose.yml down -v

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- DOCKER SUR DEVELOP ---
      - name: Push Docker (Develop)
        if: github.ref == 'refs/heads/develop'
        run: |
          docker build -t $CI_REGISTRY_IMAGE:develop -t $CI_REGISTRY_IMAGE:${{ github.sha }} .
          docker push $CI_REGISTRY_IMAGE:develop
          docker push $CI_REGISTRY_IMAGE:${{ github.sha }}

      # --- AUTO-RELEASE (Bump Patch + Tag + GitHub Release) ---
      - name: Bumper la version et taguer
        if: github.ref == 'refs/heads/main'
        run: |
          CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | sed 's/-SNAPSHOT//')
          
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
          NEW_VERSION="$major.$minor.$((patch + 1))"
          echo "APP_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          
          echo "Release : $CURRENT_VERSION → $NEW_VERSION"
          
          mvn versions:set -DnewVersion=$NEW_VERSION -DgenerateBackupPoms=false
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit -m "chore(release): v$NEW_VERSION [skip ci]"
          git tag "v$NEW_VERSION"
          git push origin main --tags

      - name: Créer la Release GitHub
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh release create "v${{ env.APP_VERSION }}" \
            --title "v${{ env.APP_VERSION }}" \
            --generate-notes \
            target/stam-api-${{ env.APP_VERSION }}.jar

      # --- DOCKER SUR MAIN ---
      - name: Push Docker (Main / Prod)
        if: github.ref == 'refs/heads/main'
        run: |
          docker build -t $CI_REGISTRY_IMAGE:latest -t $CI_REGISTRY_IMAGE:v${{ env.APP_VERSION }} -t $CI_REGISTRY_IMAGE:${{ github.sha }} .
          docker push $CI_REGISTRY_IMAGE:latest
          docker push $CI_REGISTRY_IMAGE:v${{ env.APP_VERSION }}
          docker push $CI_REGISTRY_IMAGE:${{ github.sha }}
